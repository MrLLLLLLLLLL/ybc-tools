version: '3'

services:
  ybc-tools:
    build: .
    container_name: ybc-tools
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    # Chrome in Docker needs more shared memory
    shm_size: '2gb'
    security_opt:
      - seccomp=unconfined
    environment:
      - TZ=Asia/Shanghai
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
