version: '3'

services:
  ybc-tools:
    build: .
    container_name: ybc-tools
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
