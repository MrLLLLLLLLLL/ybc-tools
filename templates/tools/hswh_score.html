{% extends "base.html" %}
{% block title %}红色文化大赛成绩查询{% endblock %}

{% block content %}
<div class="tool-page">
    <!-- Mode selector -->
    <div class="controls">
        <div class="control-group">
            <label>查询模式</label>
            <select id="query-mode">
                <option value="single">单个账号查询</option>
                <option value="keyword">按编号查询</option>
                <option value="batch">批量查询 (Excel)</option>
            </select>
        </div>
    </div>

    <!-- Single -->
    <div id="mode-single" class="mode-section">
        <div class="input-row">
            <label for="mobile">手机号</label>
            <input type="text" id="mobile" placeholder="请输入手机号" class="text-input">
        </div>
        <div class="input-row">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" class="text-input">
        </div>
        <button id="btn-single" class="btn btn-primary">查询成绩</button>
    </div>

    <!-- Keyword -->
    <div id="mode-keyword" class="mode-section" style="display:none">
        <div class="input-row">
            <label for="keyword">考生编号 / 证书编号 / 身份证号</label>
            <input type="text" id="keyword" placeholder="请输入编号" class="text-input">
        </div>
        <button id="btn-keyword" class="btn btn-primary">查询</button>
    </div>

    <!-- Batch -->
    <div id="mode-batch" class="mode-section" style="display:none">
        <div class="file-upload-area" id="file-upload-area">
            <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
            <p class="upload-hint">点击或拖拽 Excel 文件到此处</p>
            <p class="upload-formats">表头必须包含: ID、账号、密码</p>
            <p id="file-name" class="file-name" style="display:none"></p>
        </div>
        <div class="batch-actions">
            <button id="btn-batch" class="btn btn-primary" disabled>批量查询</button>
            <button id="btn-template" class="btn btn-outline">下载模板</button>
        </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-section" style="display:none">
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="progress-text" id="progress-text">查询中...</p>
    </div>

    <!-- Results -->
    <div class="result-section">
        <div class="result-header">
            <label>查询结果</label>
            <span id="status-badge" class="status-badge"></span>
            <button id="btn-export" class="btn btn-outline" style="display:none">导出 Excel</button>
        </div>
        <div id="query-result">
            <p class="placeholder-text">选择查询模式并输入信息后开始查询</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const mode = document.getElementById('query-mode');
    const mSingle = document.getElementById('mode-single');
    const mKeyword = document.getElementById('mode-keyword');
    const mBatch = document.getElementById('mode-batch');
    const resultDiv = document.getElementById('query-result');
    const badge = document.getElementById('status-badge');
    const btnExport = document.getElementById('btn-export');
    const progressSection = document.getElementById('progress-section');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    let lastResults = null;

    // Mode switch
    mode.addEventListener('change', function() {
        mSingle.style.display = this.value === 'single' ? '' : 'none';
        mKeyword.style.display = this.value === 'keyword' ? '' : 'none';
        mBatch.style.display = this.value === 'batch' ? '' : 'none';
    });

    // Single
    document.getElementById('btn-single').addEventListener('click', async function() {
        const mobile = document.getElementById('mobile').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!mobile || !password) { setStatus('请输入账号密码', 'error'); return; }
        setStatus('查询中...', 'loading');
        resultDiv.innerHTML = '<p class="placeholder-text">正在查询...</p>';
        try {
            const r = await fetch('/api/query/hswh/single', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mobile, password})
            });
            const data = await r.json();
            if (data.success) {
                lastResults = data.results || [];
                renderTable(lastResults);
                setStatus('成功 (' + lastResults.length + ' 条)', 'success');
            } else {
                resultDiv.innerHTML = '<p class="error-text">' + (data.error || '查询失败') + '</p>';
                setStatus('失败', 'error');
            }
        } catch(e) {
            resultDiv.innerHTML = '<p class="error-text">请求失败: ' + e.message + '</p>';
            setStatus('错误', 'error');
        }
    });

    // Keyword
    document.getElementById('btn-keyword').addEventListener('click', async function() {
        const keyword = document.getElementById('keyword').value.trim();
        if (!keyword) { setStatus('请输入编号', 'error'); return; }
        setStatus('查询中...', 'loading');
        resultDiv.innerHTML = '<p class="placeholder-text">正在查询...</p>';
        try {
            const r = await fetch('/api/query/hswh/keyword', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({keyword})
            });
            const data = await r.json();
            if (data.success) {
                lastResults = data.results || [];
                renderTable(lastResults);
                setStatus('成功 (' + lastResults.length + ' 条)', 'success');
            } else {
                resultDiv.innerHTML = '<p class="error-text">' + (data.error || '查询失败') + '</p>';
                setStatus('失败', 'error');
            }
        } catch(e) {
            resultDiv.innerHTML = '<p class="error-text">请求失败: ' + e.message + '</p>';
            setStatus('错误', 'error');
        }
    });

    // Batch file
    const uploadArea = document.getElementById('file-upload-area');
    const fileInput = document.getElementById('file-input');
    const fileNameEl = document.getElementById('file-name');
    const btnBatch = document.getElementById('btn-batch');
    let selectedFile = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('drag-over'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if(fileInput.files.length) handleFile(fileInput.files[0]); });

    function handleFile(file) {
        selectedFile = file;
        fileNameEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
        fileNameEl.style.display = 'block';
        btnBatch.disabled = false;
    }

    // Batch query (SSE streaming)
    btnBatch.addEventListener('click', async function() {
        if (!selectedFile) return;
        const formData = new FormData();
        formData.append('file', selectedFile);

        setStatus('查询中...', 'loading');
        progressSection.style.display = '';
        progressBar.style.width = '0%';
        progressText.textContent = '准备查询...';
        resultDiv.innerHTML = '';
        btnExport.style.display = 'none';
        btnBatch.disabled = true;

        try {
            const resp = await fetch('/api/query/hswh/batch', { method: 'POST', body: formData });
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, {stream: true});

                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const evt = JSON.parse(line.slice(6));
                        if (evt.type === 'progress') {
                            const pct = Math.round(evt.completed / evt.total * 100);
                            progressBar.style.width = pct + '%';
                            progressText.textContent = '查询中 ' + evt.completed + '/' + evt.total + ' (' + pct + '%)';
                            // Update partial results
                            if (evt.results && evt.results.length) {
                                renderTable(evt.results, true);
                            }
                        } else if (evt.type === 'done') {
                            lastResults = evt.data.results || [];
                            const ok = lastResults.filter(r => r.查询状态 === '成功').length;
                            const fail = lastResults.filter(r => r.查询状态 === '失败').length;
                            progressBar.style.width = '100%';
                            progressText.textContent = '查询完成: 成功 ' + ok + ', 失败 ' + fail;
                            renderTable(lastResults);
                            setStatus('完成 (' + lastResults.length + ' 条)', 'success');
                            btnExport.style.display = '';
                        } else if (evt.type === 'error') {
                            progressText.textContent = '查询出错: ' + evt.error;
                            setStatus('失败', 'error');
                        }
                    } catch(e) {}
                }
            }
        } catch(e) {
            progressText.textContent = '请求失败: ' + e.message;
            setStatus('错误', 'error');
        }
        btnBatch.disabled = false;
    });

    // Template download
    document.getElementById('btn-template').addEventListener('click', () => { window.location.href = '/api/query/hswh/template'; });

    // Export XLSX
    btnExport.addEventListener('click', async function() {
        if (!lastResults) return;
        btnExport.disabled = true;
        btnExport.textContent = '导出中...';
        try {
            const resp = await fetch('/api/query/hswh/export', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({results: lastResults})
            });
            if (!resp.ok) throw new Error('导出失败');
            const blob = await resp.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '成绩查询结果_' + new Date().toISOString().slice(0,10) + '.xlsx';
            a.click();
        } catch(e) {
            alert('导出失败: ' + e.message);
        }
        btnExport.disabled = false;
        btnExport.textContent = '导出 Excel';
    });

    // Helpers
    function setStatus(text, type) {
        badge.textContent = text;
        badge.className = 'status-badge status-' + type;
    }

    function renderTable(results, partial) {
        if (!results || !results.length) { if(!partial) resultDiv.innerHTML = '<p class="placeholder-text">未查询到结果</p>'; return; }
        const cols = ['ID','账号','查询状态','姓名','证件号','考生编号','赛道','组别','报名时间','市赛结果','省赛','国赛'];
        let html = '<div class="table-wrapper"><table><thead><tr>';
        cols.forEach(c => html += '<th>' + c + '</th>');
        html += '</tr></thead><tbody>';
        results.forEach(r => {
            html += '<tr>';
            cols.forEach(c => {
                const v = r[c] || '';
                let cls = '';
                if (c === '查询状态') cls = v === '成功' ? 'status-ok' : v === '失败' ? 'status-fail' : 'status-skip';
                html += '<td class="' + cls + '">' + v + '</td>';
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        resultDiv.innerHTML = html;
    }
});
</script>

<style>
.tool-page { max-width: 960px; }

.mode-section {
    display: flex; flex-direction: column; gap: 16px;
    padding: 20px; background: var(--color-surface);
    border: 1px solid var(--color-border); border-radius: var(--radius);
}
.input-row { display: flex; flex-direction: column; gap: 4px; }
.input-row label { font-weight: 600; font-size: 0.9rem; }

.batch-actions { display: flex; gap: 8px; }

/* Progress */
.progress-section { margin-top: 16px; }
.progress-bar-wrap {
    height: 8px; background: var(--color-bg); border-radius: 4px; overflow: hidden;
}
.progress-bar {
    height: 100%; width: 0; background: var(--color-primary); border-radius: 4px;
    transition: width 0.3s ease;
}
.progress-text {
    font-size: 0.85rem; color: var(--color-text-secondary); margin-top: 6px;
}

/* Table */
.table-wrapper { overflow-x: auto; max-height: 600px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--color-border); white-space: nowrap; }
th { background: var(--color-bg); font-weight: 600; position: sticky; top: 0; z-index: 1; }
tr:hover td { background: var(--color-primary-light); }
.status-ok { color: var(--color-success); font-weight: 600; }
.status-fail { color: var(--color-error); font-weight: 600; }
.status-skip { color: var(--color-warning); font-weight: 500; }
</style>
{% endblock %}
