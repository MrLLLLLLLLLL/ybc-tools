{% extends "base.html" %}

{% block title %}{{ tool.title }} - YBC 工具箱{% endblock %}

{% block content %}
<div class="tool-page">
    <div class="tool-header">
        <a href="/" class="back-link">← 返回工具列表</a>
        <h1>{{ tool.title }}</h1>
        <p class="tool-desc">{{ tool.description }}</p>
        <span class="tool-category-tag">{{ tool.category }}</span>
    </div>

    <div class="tool-workspace">
        <div class="input-section">
            <label for="json-input">输入 JSON</label>
            <textarea id="json-input" rows="12" placeholder='{"name": "hello", "items": [1, 2, 3]}'></textarea>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="indent-select">缩进</label>
                <select id="indent-select">
                    <option value="2" selected>2 空格</option>
                    <option value="4">4 空格</option>
                    <option value="tab">Tab</option>
                    <option value="0">压缩（无空白）</option>
                </select>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="sort-keys"> 键排序
                </label>
            </div>
            <div class="btn-group">
                <button id="btn-format" class="btn btn-primary">格式化</button>
                <button id="btn-validate" class="btn btn-secondary">验证</button>
                <button id="btn-copy" class="btn btn-outline" disabled>复制结果</button>
                <button id="btn-clear" class="btn btn-outline">清空</button>
            </div>
        </div>

        <div class="result-section">
            <div class="result-header">
                <label>输出</label>
                <span id="result-status" class="status-badge"></span>
            </div>
            <pre id="json-output" class="code-output"><code>在此显示格式化结果...</code></pre>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('json-input');
    const output = document.getElementById('json-output');
    const btnFormat = document.getElementById('btn-format');
    const btnValidate = document.getElementById('btn-validate');
    const btnCopy = document.getElementById('btn-copy');
    const btnClear = document.getElementById('btn-clear');
    const indentSelect = document.getElementById('indent-select');
    const sortKeys = document.getElementById('sort-keys');
    const resultStatus = document.getElementById('result-status');

    async function callFormatApi() {
        const jsonStr = input.value.trim();
        if (!jsonStr) {
            resultStatus.textContent = '请输入 JSON';
            resultStatus.className = 'status-badge status-error';
            return;
        }

        let indent = indentSelect.value;
        if (indent === 'tab') indent = '\t';
        else indent = parseInt(indent);

        try {
            const resp = await fetch('/api/devtools/json-format', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    json_string: jsonStr,
                    indent: indent,
                    sort_keys: sortKeys.checked
                })
            });
            const data = await resp.json();

            if (data.code === 200 && data.data.valid) {
                output.querySelector('code').textContent = data.data.formatted;
                resultStatus.textContent = '✓ 有效 JSON';
                resultStatus.className = 'status-badge status-success';
                btnCopy.disabled = false;
            } else {
                output.querySelector('code').textContent = data.data.error || '格式错误';
                resultStatus.textContent = '\u2717 无效 JSON';
                resultStatus.className = 'status-badge status-error';
                btnCopy.disabled = true;
            }
        } catch (e) {
            output.querySelector('code').textContent = '请求失败: ' + e.message;
            resultStatus.textContent = '\u2717 请求错误';
            resultStatus.className = 'status-badge status-error';
        }
    }

    btnFormat.addEventListener('click', callFormatApi);

    btnValidate.addEventListener('click', callFormatApi);

    btnCopy.addEventListener('click', function() {
        const text = output.querySelector('code').textContent;
        navigator.clipboard.writeText(text).then(() => {
            btnCopy.textContent = '已复制';
            setTimeout(() => btnCopy.textContent = '复制结果', 1500);
        });
    });

    btnClear.addEventListener('click', function() {
        input.value = '';
        output.querySelector('code').textContent = '在此显示格式化结果...';
        resultStatus.textContent = '';
        resultStatus.className = 'status-badge';
        btnCopy.disabled = true;
    });
});
</script>
{% endblock %}
